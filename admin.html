<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consola de Control — Marsella Conecta</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2ec; --surface: #ffffff; --ink: #1a1714; --ink-muted: #7a7168;
    --accent: #e8390e; --accent2: #2d6a4f; --border: #e2ddd6;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); padding: 24px; }
  header { margin-bottom: 32px; display: flex; justify-content: space-between; align-items: center; }
  h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.8rem; }
  h1 span { color: var(--accent); }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 32px; }
  .card { background: var(--surface); padding: 24px; border-radius: 12px; border: 1.5px solid var(--border); }
  .num { font-size: 2.2rem; font-weight: 700; color: var(--accent2); font-family: 'Syne', sans-serif; }
  .box { background: var(--surface); border-radius: 12px; border: 1.5px solid var(--border); padding: 28px; margin-bottom: 24px; }
  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 6px; }
  .field input { width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: 8px; background: var(--bg); outline: none; }
  .btn { background: var(--accent2); color: #fff; padding: 12px 24px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>

<header>
  <h1>Panel de Control <span>Marsella Conecta</span></h1>
</header>

<div class="grid">
  <div class="card"><div class="num" id="total-biz">--</div><div>Registros Activos</div></div>
  <div class="card"><div class="num" id="total-cols">--</div><div>Columnas en Producción</div></div>
</div>

<div class="box">
  <h3 style="margin-bottom:15px; font-family:'Syne'">🚀 Módulo de Despliegue Automatizado a GitHub</h3>
  <div class="field">
    <label>Anuncio Global para la Web</label>
    <input type="text" id="sys_announcement" value="¡Bienvenidos a Marsella Conecta! Directorio comercial actualizado.">
  </div>
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
    <div class="field">
      <label>Usuario Propietario del Repositorio</label>
      <input type="text" id="gh_user" value="Miltman1">
    </div>
    <div class="field">
      <label>GitHub Personal Access Token (PAT)</label>
      <input type="password" id="gh_token" placeholder="ghp_XXXXXXXXXXXXXXXXXXXX">
    </div>
  </div>
  <button class="btn" onclick="triggerDeployment()">Lanzar Actualización Externa</button>
</div>

<div class="box">
  <h3 style="margin-bottom:15px; font-family:'Syne'">📊 Diagnóstico de Columnas del Sheet 2</h3>
  <div id="live-schema-status">Mapeando estructura...</div>
</div>

<script>
const SOURCE_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT1uS_V8U8LpYv38E0v-H6_VwR8pM3D3g/pub?output=csv';

window.addEventListener('DOMContentLoaded', () => {
  fetch(SOURCE_CSV)
    .then(r => r.text())
    .then(csv => {
      const rows = csv.split('\n').filter(r => r.trim() !== '');
      if(rows.length === 0) return;
      const headers = rows[0].split(',').map(h => h.trim().replace(/"/g, ''));
      document.getElementById('total-biz').textContent = rows.length - 1;
      document.getElementById('total-cols').textContent = headers.length;

      let debugHtml = '<ul>';
      headers.forEach(h => { debugHtml += `<li>Columna detectada: <strong>${h}</strong> <span style="color:var(--accent2)">✔ Sincronizada</span></li>`; });
      debugHtml += '</ul>';
      document.getElementById('live-schema-status').innerHTML = debugHtml;
    });
});

function triggerDeployment() {
  const user = document.getElementById('gh_user').value.trim();
  const token = document.getElementById('gh_token').value.trim();
  const announcement = document.getElementById('sys_announcement').value;

  if(!token) { alert("Ingresa tu token PAT de GitHub."); return; }

  const payload = { site_announcement: announcement, date: new Date().toISOString() };

  fetch(`https://api.github.com/repos/${user}/marsella-conecta/dispatches`, {
    method: 'POST',
    headers: {
      'Authorization': `token ${token}`,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      event_type: 'admin_config_update',
      client_payload: { config_data: JSON.stringify(payload, null, 2) }
    })
  })
  .then(res => {
    if(res.status === 204) { alert("¡Excelente! GitHub Actions está compilando la actualización en segundo plano."); }
    else { alert("Error de credenciales. Valida tu token de acceso."); }
  });
}
</script>
</body>
</html>
