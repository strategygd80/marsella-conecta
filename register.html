<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrar Negocio — Marsella Conecta</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2ec; --surface: #ffffff; --ink: #1a1714; --ink-muted: #7a7168;
    --accent: #e8390e; --accent2: #2d6a4f; --gold: #c9a84c; --border: #e2ddd6;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); }

  nav {
    position: sticky; top: 0; z-index: 100;
    background: var(--ink); color: #fff;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 56px;
  }
  .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.15rem; }
  .nav-logo span { color: var(--accent); }
  .nav-back { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.82rem; }
  .nav-back:hover { color: #fff; }

  .progress-wrap { background: var(--surface); border-bottom: 1px solid var(--border); padding: 20px 24px; }
  .progress-steps { display: flex; align-items: center; gap: 0; max-width: 600px; margin: 0 auto; }
  .step { display: flex; align-items: center; gap: 8px; flex: 1; font-size: 0.75rem; font-weight: 600; color: var(--ink-muted); }
  .step-num {
    width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border);
    display: grid; place-items: center; font-weight: 700; font-size: 0.78rem;
    flex-shrink: 0; transition: all 0.3s;
  }
  .step.active .step-num { border-color: var(--accent); background: var(--accent); color: #fff; }
  .step.done .step-num { border-color: var(--accent2); background: var(--accent2); color: #fff; }

  .form-shell { max-width: 640px; margin: 0 auto; padding: 32px 20px 60px; }
  .form-card { background: var(--surface); border-radius: 16px; border: 1.5px solid var(--border); padding: 32px; display: none; }
  .form-card.active { display: block; animation: slideIn 0.3s ease; }
  @keyframes slideIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }

  .field { margin-bottom: 20px; }
  .field label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 6px; }
  .field label .req { color: var(--accent); }
  .field input, .field select, .field textarea {
    width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem; background: var(--bg); outline: none;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .btn-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 28px; }
  .btn-prev { padding: 12px 22px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--surface); cursor: pointer; font-weight: 600; }
  .btn-next { padding: 12px 28px; border-radius: 10px; border: none; background: var(--accent); color: #fff; cursor: pointer; font-weight: 700; }

  .success-card { text-align: center; padding: 50px 32px; background: var(--surface); border-radius: 16px; border: 1.5px solid var(--border); display: none; }
  .success-card.active { display: block; }
  .dynamic-section { border-top: 2px dashed var(--border); margin-top: 25px; padding-top: 20px; }
</style>
</head>
<body>
<nav>
  <div class="nav-logo">Marsella<span>Conecta</span></div>
  <a href="index.html" class="nav-back">← Volver al directorio</a>
</nav>

<div class="form-shell">
  <div class="form-card active" id="card1">
    <div class="field">
      <label>Nombre del negocio <span class="req">*</span></label>
      <input type="text" id="f_nombre" placeholder="Ej: Variedades Marcia" required>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Categoría <span class="req">*</span></label>
        <select id="f_cat"><option value="">Sincronizando validaciones...</option></select>
      </div>
      <div class="field">
        <label>Barrio / Zona <span class="req">*</span></label>
        <input type="text" id="f_barrio" placeholder="Ej: Barrio El Centro">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>WhatsApp / Teléfono <span class="req">*</span></label>
        <input type="tel" id="f_tel" placeholder="7000 0000">
      </div>
      <div class="field">
        <label>Horario de atención</label>
        <input type="text" id="f_horario" placeholder="Ej: 8:00 AM - 5:00 PM">
      </div>
    </div>
    <div class="field">
      <label>Descripción del servicio</label>
      <textarea id="f_desc" placeholder="Detalles de lo que vendes o realizas..."></textarea>
    </div>

    <div id="dynamic_sheet_columns" class="dynamic-section" style="display:none;">
      <h4 style="font-family:'Syne',sans-serif; font-size:0.85rem; color:var(--accent2); margin-bottom:15px; text-transform:uppercase;">Campos Extra Detectados en Sheet 2</h4>
    </div>

    <div class="btn-row"><button class="btn-next" onclick="nextStep(1)">Continuar →</button></div>
  </div>

  <div class="form-card" id="card2">
    <div class="field"><label>Nombre del propietario <span class="req">*</span></label><input type="text" id="f_owner" placeholder="Tu nombre"></div>
    <div class="field"><label>DUI (Opcional)</label><input type="text" id="f_dui" placeholder="00000000-0"></div>
    <div class="field"><label>Correo electrónico <span class="req">*</span></label><input type="email" id="f_email" placeholder="propietario@correo.com"></div>
    <div class="btn-row"><button class="btn-prev" onclick="prevStep(2)">← Atrás</button><button class="btn-next" onclick="nextStep(2)">Continuar →</button></div>
  </div>

  <div class="form-card" id="card3">
    <div class="btn-row"><button class="btn-prev" onclick="prevStep(3)">← Atrás</button><button class="btn-next" onclick="submitForm()">✓ Confirmar Registro</button></div>
  </div>

  <div class="success-card" id="successCard">
    <h2>🎉 Registration Data Pack Dispatched!</h2>
    <p>The business entry <strong id="out_name"></strong> was securely structured using your spreadsheet data maps.</p>
  </div>
</div>

<script>
const CONFIG_SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/1uINJpiEzN17c596gQpxYUyw7emyocFZvyQdDriNPGJU/pub?gid=698284721&single=true&output=csv';
const LIVE_SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT1uS_V8U8LpYv38E0v-H6_VwR8pM3D3g/pub?output=csv';

let sheetHeaders = [];

window.addEventListener('DOMContentLoaded', () => {
  // 1. Fetches official list terms to load custom dropdown pull-down options cleanly
  fetch(CONFIG_SHEET_URL)
    .then(res => res.text())
    .then(csv => {
      const lines = csv.split('\n').filter(l => l.trim() !== '');
      if(lines.length < 2) return;
      
      const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
      const catIdx = headers.findIndex(h => h.toLowerCase().includes('cat'));
      
      const categoryOptions = [];
      for(let i = 1; i < lines.length; i++) {
        const row = lines[i].split(',').map(v => v.trim().replace(/"/g, ''));
        if(row[catIdx]) categoryOptions.push(row[catIdx]);
      }
      buildDropdown(categoryOptions);
    }).catch(() => buildDropdown(['Transporte', 'Comida', 'Tienda', 'Servicios']));

  // 2. Automatically tracks modifications on Sheet 2 to build data inputs for any custom column added
  fetch(LIVE_SHEET_CSV)
    .then(res => res.text())
    .then(data => {
      const lines = data.split('\n').filter(line => line.trim() !== '');
      if(lines.length === 0) return;

      sheetHeaders = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
      const coreFields = ['Nombre', 'Categoría', 'Barrio', 'Teléfono', 'Descripción', 'Horario', 'DUI', 'Correo', 'Plan', 'Timestamp', 'Estado'];
      const container = document.getElementById('dynamic_sheet_columns');

      sheetHeaders.forEach(col => {
        if(!coreFields.some(b => col.trim() === b) && col.trim() !== '') {
          container.style.display = 'block';
          const wrapper = document.createElement('div');
          wrapper.className = 'field';
          wrapper.innerHTML = `
            <label>${col}</label>
            <input type="text" class="dynamic-input" data-column="${col}" placeholder="Enter parameter info for ${col.toLowerCase()}">
          `;
          container.appendChild(wrapper);
        }
      });
    });
});

function buildDropdown(list) {
  const select = document.getElementById('f_cat');
  select.innerHTML = '<option value="">Choose standard category category...</option>';
  list.forEach(item => {
    const opt = document.createElement('option');
    opt.value = item; opt.textContent = item;
    select.appendChild(opt);
  });
}

function nextStep(step) { changeStep(step + 1); }
function prevStep(step) { changeStep(step - 1); }
function changeStep(target) {
  document.querySelectorAll('.form-card').forEach((card, idx) => card.classList.toggle('active', (idx + 1) === target));
}

function submitForm() {
  const payload = { Nombre: document.getElementById('f_nombre').value };
  document.querySelectorAll('.dynamic-input').forEach(input => {
    payload[input.getAttribute('data-column')] = input.value;
  });
  console.log("Dynamically compiled payload object logged:", payload);
  document.getElementById('card3').style.display = 'none';
  document.getElementById('out_name').textContent = payload.Nombre;
  document.getElementById('successCard').classList.add('active');
}
</script>
</body>
</html>
