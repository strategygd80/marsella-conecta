<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marsella Conecta — Relational Dynamic Directory</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root {
    --bg: #f5f2ec; --surface: #ffffff; --ink: #1a1714; --ink-muted: #7a7168;
    --accent: #e8390e; --accent2: #2d6a4f; --border: #e2ddd6;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); padding-bottom: 60px; }

  header { background: var(--ink); color: #fff; padding: 40px 24px; text-align: center; }
  .logo { font-family: 'Syne', sans-serif; font-size: 2.3rem; font-weight: 800; text-align: center; color: #fff; margin-bottom: 8px; }
  .logo span { color: var(--accent); }

  .nav-bar { display: flex; justify-content: center; gap: 15px; margin: -20px auto 30px; position: relative; z-index: 10; }
  .nav-btn { background: var(--surface); color: var(--ink); padding: 10px 20px; border-radius: 30px; text-decoration: none; font-weight: 700; font-size: 0.85rem; border: 1.5px solid var(--border); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
  .nav-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }

  .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
  .control-box { background: var(--surface); border: 1.5px solid var(--border); padding: 20px; border-radius: 16px; margin-bottom: 32px; display: flex; gap: 12px; flex-wrap: wrap; }
  .search-input { flex: 1; min-width: 260px; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 10px; background: var(--bg); outline: none; }
  .filter-select { padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 10px; background: var(--bg); outline: none; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
  .biz-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 16px; padding: 24px; display: flex; flex-direction: column; justify-content: space-between; }
  
  .biz-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .biz-title { font-family: 'Syne', sans-serif; font-size: 1.25rem; font-weight: 700; }
  .biz-icon-container { background: var(--bg); width: 48px; height: 48px; display: grid; place-items: center; border-radius: 12px; color: var(--accent); border: 1px solid var(--border); flex-shrink: 0; }
  
  .biz-badge { background: #fff5f3; color: var(--accent); font-size: 0.7rem; font-weight: 700; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; display: inline-block; margin-bottom: 12px; border: 1px solid #fcdbd3; }
  .biz-desc { font-size: 0.88rem; color: var(--ink-muted); margin-bottom: 15px; }

  .meta-list { border-top: 1px dashed var(--border); padding-top: 12px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 6px; font-size: 0.82rem; }
  .meta-item { display: flex; gap: 6px; }
  .meta-label { font-weight: 700; text-transform: capitalize; }

  .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn-action { text-align: center; padding: 10px; border-radius: 10px; font-size: 0.85rem; font-weight: 700; text-decoration: none; border: 1.5px solid var(--border); }
  .btn-action.wa { background: #25d366; color: #fff; border-color: #25d366; }

  .no-results { grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--ink-muted); }
</style>
</head>
<body>

<header>
  <div class="logo">Marsella<span>Conecta</span></div>
</header>

<div class="nav-bar">
  <a href="register.html" class="nav-btn primary">➕ Register My Business</a>
  <a href="admin.html" class="nav-btn">📊 Admin Panel</a>
</div>

<div class="container">
  <div class="control-box">
    <input type="text" id="searchBar" class="search-input" placeholder="Search entries, keywords, or active properties...">
    <select id="catFilter" class="filter-select"><option value="">All Categories</option></select>
  </div>

  <div id="directoryGrid" class="grid">
    <div class="no-results">Syncing master sheet tables and icons...</div>
  </div>
</div>

<script>
// URL 1: Main Business Registry database submissions (Sheet 2)
const BUSINESS_SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT1uS_V8U8LpYv38E0v-H6_VwR8pM3D3g/pub?output=csv';

// URL 2: Your Category Management & Icon Code Configuration database (Gid: 698284721)
const CONFIG_SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/1uINJpiEzN17c596gQpxYUyw7emyocFZvyQdDriNPGJU/pub?gid=698284721&single=true&output=csv';

let categoryDatabase = {}; 
let dataRecords = [];
let columnsPresent = [];

window.addEventListener('DOMContentLoaded', () => {
  fetchCategorySchema();
  
  document.getElementById('searchBar').addEventListener('input', runFilters);
  document.getElementById('catFilter').addEventListener('change', runFilters);
});

function fetchCategorySchema() {
  fetch(CONFIG_SHEET_URL)
    .then(r => r.text())
    .then(csv => {
      const lines = csv.split('\n').filter(l => l.trim() !== '');
      if(lines.length < 2) return;
      
      const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
      const catIdx = headers.findIndex(h => h.toLowerCase().includes('cat'));
      const iconIdx = headers.findIndex(h => h.toLowerCase().includes('icon'));

      const selectFilter = document.getElementById('catFilter');

      for(let i = 1; i < lines.length; i++) {
        const row = lines[i].split(',').map(v => v.trim().replace(/"/g, ''));
        if(row[catIdx]) {
          const categoryName = row[catIdx];
          const iconCode = row[iconIdx] || 'briefcase'; 
          
          categoryDatabase[categoryName.toLowerCase().trim()] = iconCode.trim();

          const opt = document.createElement('option');
          opt.value = categoryName; opt.textContent = categoryName;
          selectFilter.appendChild(opt);
        }
      }
      fetchBusinessEntries();
    }).catch(() => fetchBusinessEntries());
}

function fetchBusinessEntries() {
  fetch(BUSINESS_SHEET_URL)
    .then(res => res.text())
    .then(csv => {
      const lines = csv.split('\n').filter(l => l.trim() !== '');
      if (lines.length === 0) return;

      columnsPresent = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
      
      dataRecords = lines.slice(1).map(row => {
        const values = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || row.split(',');
        const recordObj = {};
        columnsPresent.forEach((header, index) => {
          recordObj[header] = values[index] ? values[index].trim().replace(/"/g, '') : '';
        });
        return recordObj;
      });

      renderDirectoryCards(dataRecords);
    });
}

function renderDirectoryCards(dataset) {
  const grid = document.getElementById('directoryGrid');
  grid.innerHTML = '';

  if(dataset.length === 0) {
    grid.innerHTML = '<div class="no-results">No businesses match your filters.</div>';
    return;
  }

  dataset.forEach(biz => {
    // Explicit exact keyword targeting mapped directly to your live Sheet 2 structural schema
    const nameKey = columnsPresent.find(c => c.trim() === 'Nombre') || columnsPresent[0];
    const catKey = columnsPresent.find(c => c.trim() === 'Categoría') || columnsPresent[1];
    const descKey = columnsPresent.find(c => c.trim() === 'Descripción') || columnsPresent[4];
    const telKey = columnsPresent.find(c => c.trim() === 'Teléfono') || columnsPresent[3];

    const name = biz[nameKey] || 'Negocio';
    const rawCat = (biz[catKey] || '').trim();
    const desc = biz[descKey] || 'Sin descripción disponible por el momento.';
    const phone = biz[telKey] || '';

    // Matches lowercase category rows straight to icon components
    const matchedIcon = categoryDatabase[rawCat.toLowerCase()] || 'briefcase';

    let card = `
      <div class="biz-card">
        <div>
          <div class="biz-header">
            <h3 class="biz-title">${name}</h3>
            <div class="biz-icon-container">
              <i data-lucide="${matchedIcon}"></i>
            </div>
          </div>
          <span class="biz-badge">${rawCat || 'General'}</span>
          <p class="biz-desc">${desc}</p>
          <div class="meta-list">
    `;

    // Loops automatically over newly discovered column additions
    columnsPresent.forEach(col => {
      const val = biz[col];
      const blacklist = ['Nombre', 'Categoría', 'Descripción', 'Plan', 'Timestamp', 'Estado', 'DUI', 'Correo', 'Owner', 'Propietario'];
      
      // CRITICAL STRIPPER FILTER: Strips empty inputs and ignores management columns completely
      if(!val || val.trim() === '' || blacklist.some(b => col.trim() === b)) return;

      card += `
        <div class="meta-item">
          <span class="meta-label">${col}:</span>
          <span>${val}</span>
        </div>
      `;
    });

    card += `
          </div>
        </div>
        <div class="action-row">
          <a href="tel:+503${phone.replace(/\s+/g, '')}" class="btn-action">📞 Call</a>
          <a href="https://wa.me/503${phone.replace(/\s+/g, '')}" target="_blank" class="btn-action wa">💬 WhatsApp</a>
        </div>
      </div>
    `;
    grid.innerHTML += card;
  });

  lucide.createIcons();
}

function runFilters() {
  const query = document.getElementById('searchBar').value.toLowerCase();
  const cat = document.getElementById('catFilter').value;

  const match = dataRecords.filter(b => {
    const nameKey = columnsPresent.find(c => c.trim() === 'Nombre') || columnsPresent[0];
    const descKey = columnsPresent.find(c => c.trim() === 'Descripción') || columnsPresent[4];
    const catKey = columnsPresent.find(c => c.trim() === 'Categoría') || columnsPresent[1];

    const n = (b[nameKey] || '').toLowerCase();
    const d = (b[descKey] || '').toLowerCase();
    const c = b[catKey] || '';
    
    return (n.includes(query) || d.includes(query)) && (cat === '' || c === cat);
  });
  renderDirectoryCards(match);
}
</script>
</body>
</html>
